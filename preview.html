<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Preview Guide</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: sans-serif;
        background: linear-gradient(135deg, #fff8f3, #ffe6f2 55%, #e6f4ff);
        color: #2f2a3d;
      }

      .card {
        width: min(680px, 92vw);
        background: rgba(255, 255, 255, 0.88);
        border: 1px solid #ffd4e6;
        border-radius: 16px;
        padding: 1.4rem;
        box-shadow: 0 12px 28px rgba(83, 96, 147, 0.2);
      }

      h1 {
        margin: 0 0 0.8rem;
        font-size: 1.4rem;
      }

      p {
        margin: 0.35rem 0;
      }

      code {
        background: #fff;
        border: 1px solid #ffd4e6;
        border-radius: 7px;
        padding: 0.08rem 0.4rem;
      }

      a {
        color: #2f82db;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>這是提示頁，不是 React 實際畫面</h1>
      <p>請開啟 <a href="http://localhost:5173/">http://localhost:5173/</a> 查看新版樣式。</p>
      <p>若尚未啟動，請先在專案目錄執行：<code>npm.cmd run dev</code></p>
    </main>
  </body>
</html>
